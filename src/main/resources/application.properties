spring.application.name=my-first-app

# ===== Database (MySQL) =====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/book_trade?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:1234}

# ===== Redis =====
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.timeout=3000ms
spring.redis.lettuce.pool.max-active=16
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.MySpringBoot.my_first_app.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ===== File Upload =====
file.upload.path=${FILE_UPLOAD_PATH:/var/lib/uploads}

# ===== Static Resources =====
spring.web.resources.static-locations=classpath:/static/,file:${file.upload.path}
spring.mvc.static-path-pattern=/**
spring.mvc.dispatch-options-request=true

# ===== CORS =====
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

