version: "3.8"

# ============================================
# docker-compose.yml - 淘籍籍 完整部署
# 包含: MySQL + Redis + Spring Boot 后端
# ============================================

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: book-trade-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-1234}
      MYSQL_DATABASE: book_trade
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: book-trade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Spring Boot 后端 ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-trade-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FILE_UPLOAD_PATH: /var/lib/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    volumes:
      - upload-data:/var/lib/uploads

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  upload-data:
    driver: local
